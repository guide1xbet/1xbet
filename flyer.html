
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de Flyers Premium — 1xBet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#07090f;color:#e8eaf2;min-height:100vh;}
.topbar{background:#0c0f1c;border-bottom:1px solid #1a1f35;padding:0 1.5rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.logo{font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:-.01em;}
.logo em{color:#e53935;font-style:normal;}
.badge{background:#e53935;color:#fff;font-size:.56rem;font-weight:800;padding:.12rem .45rem;border-radius:4px;margin-left:.35rem;letter-spacing:.05em;}
.agent-tag{font-size:.72rem;color:#5a6490;background:#12162a;padding:.3rem .85rem;border-radius:20px;border:1px solid #1a1f35;}
.layout{display:grid;grid-template-columns:310px 1fr;height:calc(100vh - 54px);}
.sidebar{background:#0c0f1c;border-right:1px solid #1a1f35;overflow-y:auto;padding:1.1rem;}
.preview-area{background:#05070d;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem;overflow-y:auto;gap:1rem;}
.sec{margin-bottom:1.1rem;}
.sec-title{font-size:.6rem;font-weight:700;color:#3a4265;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.6rem;}

/* TEMPLATES GRID */
.templates-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.tpl-btn{background:#12162a;border:1.5px solid #1a1f35;border-radius:8px;padding:.65rem .4rem;text-align:center;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.tpl-btn:hover{border-color:#e53935;transform:translateY(-1px);}
.tpl-btn.active{border-color:#e53935;background:rgba(229,57,53,.1);}
.tpl-btn .tpl-ico{font-size:1.3rem;display:block;margin-bottom:.25rem;}
.tpl-btn .tpl-name{font-size:.68rem;font-weight:700;color:#8892b0;line-height:1.3;}
.tpl-btn.active .tpl-name{color:#e53935;}
.tpl-hot{position:absolute;top:4px;right:4px;background:#e53935;color:#fff;font-size:.5rem;font-weight:800;padding:.1rem .3rem;border-radius:3px;}

/* FORM */
.fg{margin-bottom:.7rem;}
.fg label{display:block;font-size:.63rem;font-weight:700;color:#3a4265;margin-bottom:.28rem;letter-spacing:.05em;text-transform:uppercase;}
.fg input,.fg textarea,.fg select{width:100%;padding:.48rem .7rem;background:#07090f;border:1px solid #1a1f35;border-radius:6px;font-size:.78rem;color:#e8eaf2;font-family:inherit;transition:border-color .15s;}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:#e53935;}
.fg input::placeholder,.fg textarea::placeholder{color:#1e2440;}
.fg select option{background:#0c0f1c;}
.fg textarea{resize:vertical;min-height:55px;line-height:1.5;}

/* COLORS */
.color-row{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.35rem;}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0;}
.sw.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.2);}

/* BTNS */
.btn-gen{width:100%;background:linear-gradient(135deg,#e53935,#b71c1c);color:#fff;border:none;padding:.68rem;border-radius:8px;font-size:.83rem;font-weight:700;cursor:pointer;margin-top:.2rem;letter-spacing:.02em;transition:opacity .15s;}
.btn-gen:hover{opacity:.88;}
.btn-dl,.btn-wa{width:100%;padding:.58rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;margin-top:.4rem;display:none;transition:all .15s;}
.btn-dl{background:#12162a;border:1px solid #1a1f35;color:#e8eaf2;}
.btn-dl:hover{border-color:#e53935;}
.btn-wa{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.25);color:#25d366;}

/* PREVIEW */
.canvas-wrap{border-radius:12px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.8);position:relative;}
canvas{display:block;max-width:460px;width:100%;height:auto;}
.hint{font-size:.68rem;color:#1e2440;text-align:center;}

/* FORMAT */
.fmt-row{display:flex;gap:.35rem;margin-bottom:.7rem;}
.fmt{flex:1;background:#12162a;border:1px solid #1a1f35;border-radius:6px;padding:.38rem .25rem;text-align:center;cursor:pointer;font-size:.63rem;color:#3a4265;line-height:1.4;transition:all .15s;}
.fmt.active{border-color:#e53935;color:#e53935;background:rgba(229,57,53,.07);}

#blocked{position:fixed;inset:0;background:#07090f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.75rem;z-index:999;}
@media(max-width:700px){.layout{grid-template-columns:1fr;height:auto;}.preview-area{padding:1rem;}.canvas-wrap canvas{max-width:100%;}}
</style>
</head>

<script>
var AGENTS={
  joseph:{nom:'Joseph Henry',phone:'+224 620 611 648',promo:'JHL224',pays:'Guinée Conakry',flag:'🇬🇳',key:'joseph2025'},
  elena:{nom:'Elena',phone:'+7 910 875 4783',promo:'RUS76',pays:'Russie',flag:'🇷🇺',key:'elena2025'}
};
var AG=null,TPL='football',FMT='carre';
var PALETTES={
  red:{bg1:'#0d0002',bg2:'#1a0005',acc:'#e53935',acc2:'#ff8f00',glow:'rgba(229,57,53,0.4)'},
  blue:{bg1:'#000d1a',bg2:'#001529',acc:'#1565c0',acc2:'#ffd700',glow:'rgba(21,101,192,0.4)'},
  green:{bg1:'#001a05',bg2:'#00260a',acc:'#2e7d32',acc2:'#76ff03',glow:'rgba(46,125,50,0.4)'},
  purple:{bg1:'#0d0018',bg2:'#1a0030',acc:'#6a1b9a',acc2:'#ea80fc',glow:'rgba(106,27,154,0.4)'},
  dark:{bg1:'#05050f',bg2:'#0d0d1f',acc:'#e94560',acc2:'#0f3460',glow:'rgba(233,69,96,0.4)'},
  orange:{bg1:'#1a0500',bg2:'#2d0a00',acc:'#e64a19',acc2:'#ffd740',glow:'rgba(230,74,25,0.4)'}
};
var PAL=PALETTES.red;

function init(){
  var p=new URLSearchParams(location.search),ref=p.get('ref'),key=p.get('key'),ag=AGENTS[ref];
  if(!ag||key!==ag.key){document.getElementById('blocked').style.display='flex';return;}
  AG=ag;
  document.getElementById('agent-tag').textContent=ag.flag+' '+ag.nom;
  draw();
}

function setTpl(t,el){
  TPL=t;
  document.querySelectorAll('.tpl-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  ['football','bonus','can','temoignage','promo','retrait'].forEach(f=>{
    document.getElementById('form-'+f).style.display=f===t?'block':'none';
  });
  draw();
}

function setFmt(f,el){
  FMT=f;
  document.querySelectorAll('.fmt').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  draw();
}

function setPalette(name,el){
  PAL=PALETTES[name];
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  draw();
}

function getSz(){
  if(FMT==='story')return{w:1080,h:1920};
  if(FMT==='paysage')return{w:1200,h:630};
  return{w:1080,h:1080};
}

function draw(){
  if(!AG)return;
  var sz=getSz(),W=sz.w,H=sz.h,s=W/1080;
  var cv=document.getElementById('c');
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');

  drawBG(ctx,W,H,s);
  drawHeader(ctx,W,H,s);

  if(TPL==='football')tplFootball(ctx,W,H,s);
  else if(TPL==='bonus')tplBonus(ctx,W,H,s);
  else if(TPL==='can')tplCAN(ctx,W,H,s);
  else if(TPL==='temoignage')tplTemoignage(ctx,W,H,s);
  else if(TPL==='promo')tplPromo(ctx,W,H,s);
  else if(TPL==='retrait')tplRetrait(ctx,W,H,s);

  drawFooter(ctx,W,H,s);
  document.getElementById('btn-dl').style.display='block';
  document.getElementById('btn-wa').style.display='block';
}

function drawBG(ctx,W,H,s){
  // Fond principal
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,PAL.bg1);
  bg.addColorStop(0.5,PAL.bg2);
  bg.addColorStop(1,PAL.bg1);
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // Effet lumière gauche (bleu)
  var gl=ctx.createRadialGradient(0,H*0.4,0,0,H*0.4,W*0.7);
  gl.addColorStop(0,'rgba(30,60,180,0.25)');
  gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;
  ctx.fillRect(0,0,W,H);

  // Effet lumière droite (couleur accent)
  var gr=ctx.createRadialGradient(W,H*0.4,0,W,H*0.4,W*0.7);
  gr.addColorStop(0,PAL.glow);
  gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;
  ctx.fillRect(0,0,W,H);

  // Lignes diagonales subtiles
  ctx.save();
  ctx.globalAlpha=0.025;
  for(var i=0;i<12;i++){
    ctx.beginPath();
    ctx.moveTo(-200*s+i*200*s,0);
    ctx.lineTo(W-200*s+i*200*s,H);
    ctx.strokeStyle='#fff';
    ctx.lineWidth=80*s;
    ctx.stroke();
  }
  ctx.restore();

  // Cercles décoratifs
  ctx.save();
  ctx.globalAlpha=0.06;
  for(var j=0;j<5;j++){
    ctx.beginPath();
    ctx.arc(W*0.85,H*0.2,(j+1)*120*s,0,Math.PI*2);
    ctx.strokeStyle=PAL.acc;
    ctx.lineWidth=2*s;
    ctx.stroke();
  }
  for(var k=0;k<4;k++){
    ctx.beginPath();
    ctx.arc(W*0.15,H*0.8,(k+1)*100*s,0,Math.PI*2);
    ctx.strokeStyle='#3060cc';
    ctx.lineWidth=2*s;
    ctx.stroke();
  }
  ctx.restore();

  // Bande top
  var topG=ctx.createLinearGradient(0,0,W,0);
  topG.addColorStop(0,'rgba(30,60,180,0.8)');
  topG.addColorStop(0.5,PAL.acc);
  topG.addColorStop(1,'rgba(30,60,180,0.8)');
  ctx.fillStyle=topG;
  ctx.fillRect(0,0,W,5*s);
}

function drawHeader(ctx,W,H,s){
  ctx.save();
  ctx.textAlign='center';

  // Logo 1XBET avec style premium
  var logoY=80*s;
  ctx.font='900 '+(72*s)+'px "Segoe UI",Arial Black';
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.shadowColor=PAL.acc;
  ctx.shadowBlur=0;
  // Dessiner "1" "X" "BET" séparément
  var metrics1=ctx.measureText('1');
  var metricsX=ctx.measureText('X');
  var metricsB=ctx.measureText('BET');
  var totalW=metrics1.width+metricsX.width+metricsB.width;
  var startX=W/2-totalW/2;
  ctx.textAlign='left';
  ctx.fillStyle='#fff';
  ctx.fillText('1',startX,logoY);
  ctx.fillStyle=PAL.acc2;
  ctx.shadowColor=PAL.acc2;
  ctx.shadowBlur=15*s;
  ctx.fillText('X',startX+metrics1.width,logoY);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';
  ctx.fillText('BET',startX+metrics1.width+metricsX.width,logoY);
  ctx.restore();

  // Ligne séparatrice header
  var lg=ctx.createLinearGradient(0,0,W,0);
  lg.addColorStop(0,'transparent');
  lg.addColorStop(0.3,PAL.acc2);
  lg.addColorStop(0.7,PAL.acc2);
  lg.addColorStop(1,'transparent');
  ctx.fillStyle=lg;
  ctx.fillRect(W/2-280*s,92*s,560*s,2*s);
}

function tplFootball(ctx,W,H,s){
  var eq1=v('f-eq1')||'Guinée',eq2=v('f-eq2')||'Sénégal';
  var fl1=v('f-flag1')||'🇬🇳',fl2=v('f-flag2')||'🇸🇳';
  var comp=v('f-comp')||'Champions League',date=v('f-date')||'Ce soir à 21:00';
  var isStory=FMT==='story';
  var baseY=isStory?1.7:1;

  // Badge compétition
  ctx.save();
  ctx.textAlign='center';
  var compText=comp.toUpperCase();
  ctx.font='700 '+(30*s)+'px "Segoe UI",Arial';
  var compW=ctx.measureText(compText).width+70*s;
  var compX=W/2-compW/2,compY=115*s;
  roundRect(ctx,compX,compY,compW,44*s,22*s);
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fill();
  var bdG=ctx.createLinearGradient(compX,0,compX+compW,0);
  bdG.addColorStop(0,PAL.acc);
  bdG.addColorStop(1,'rgba(30,60,180,0.8)');
  ctx.strokeStyle=bdG;
  ctx.lineWidth=1.5*s;
  ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText('⚽ '+compText,W/2,145*s);
  ctx.restore();

  var teamsY=(isStory?580:360)*s;

  // Zone équipes avec fond glassmorphism
  ctx.save();
  roundRect(ctx,50*s,teamsY-80*s,W-100*s,180*s,20*s);
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1*s;
  ctx.stroke();
  ctx.restore();

  // Drapeaux et noms équipes
  ctx.save();
  // Équipe 1 (gauche)
  ctx.font=(90*s)+'px Arial';
  ctx.textAlign='center';
  ctx.fillText(fl1,160*s,teamsY-10*s);
  ctx.font='800 '+(52*s)+'px "Segoe UI",Arial';
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.8)';
  ctx.shadowBlur=10*s;
  ctx.fillText(eq1.toUpperCase(),160*s,teamsY+65*s);

  // Équipe 2 (droite)
  ctx.font=(90*s)+'px Arial';
  ctx.textAlign='center';
  ctx.fillText(fl2,W-160*s,teamsY-10*s);
  ctx.font='800 '+(52*s)+'px "Segoe UI",Arial';
  ctx.fillStyle='#fff';

function wrapText(ctx,text,x,y,maxW,lh){
  if(!text)return;
  var words=text.split(' '),line='',cy=y;
  for(var i=0;i<words.length;i++){
    var tl=line+words[i]+' ';
    if(ctx.measureText(tl).width>maxW&&i>0){ctx.fillText(line.trim(),x,cy);line=words[i]+' ';cy+=lh;}
    else line=tl;
  }
  ctx.fillText(line.trim(),x,cy);
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function lerpHex(a,b,t){
  var ah=parseInt(a.replace('#',''),16),bh=parseInt(b.replace('#',''),16);
  var r=Math.round(((ah>>16)&255)+(((bh>>16)&255)-((ah>>16)&255))*t);
  var g=Math.round(((ah>>8)&255)+(((bh>>8)&255)-((ah>>8)&255))*t);
  var bl=Math.round((ah&255)+((bh&255)-(ah&255))*t);
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}
function hexA(hex,alpha){
  var h=parseInt(hex.replace('#',''),16);
  return 'rgba('+((h>>16)&255)+','+((h>>8)&255)+','+(h&255)+','+alpha+')';
}
